spring:
  application:
    name: esports-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/esportstracker
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate # schema changes go through Flyway migrations, not Hibernate auto-generation
    show-sql: false
    open-in-view: false # avoid lazy-loading DB calls inside the view layer; fetch what's needed in the service
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true # RFC 7807 bodies for built-in errors (e.g. @Valid failures), consistent with our custom exception handlers
  jackson:
    deserialization:
      fail-on-unknown-properties: false # external API responses (Riot/Valve) can add fields over time; our DTOs only map what we use

riot:
  esports-api-key: ${RIOT_ESPORTS_API_KEY}
  base-url: https://esports-api.lolesports.com/persisted/gw

steam:
  api-key: ${STEAM_API_KEY}
  base-url: https://api.steampowered.com/IDOTA2Match_570

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000 # 24h

sync:
  matches-cron: "0 */15 * * * *"
  tournaments-cron: "0 0 */6 * * *"
