spring:
  application:
    name: esports-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/esportstracker
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate # schema changes go through Flyway migrations, not Hibernate auto-generation
    show-sql: false
    open-in-view: false # avoid lazy-loading DB calls inside the view layer; fetch what's needed in the service
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true # RFC 7807 bodies for built-in errors (e.g. @Valid failures), consistent with our custom exception handlers
  jackson:
    deserialization:
      fail-on-unknown-properties: false # external API responses (Riot/Valve) can add fields over time; our DTOs only map what we use
  cache:
    type: caffeine
    cache-names: matchDetails, leagueSyncThrottle
    caffeine:
      # Match details are proxied from Riot on demand (not synced); a short TTL keeps
      # live games fresh while shielding Riot from one request per page view. Same TTL also
      # throttles the on-demand per-league match sync triggered by visiting a team page
      # (RiotSyncService.syncLeagueOnDemand) - repeated visits within 60s are a no-op.
      spec: expireAfterWrite=60s,maximumSize=200

riot:
  esports-api-key: ${RIOT_ESPORTS_API_KEY}
  base-url: https://esports-api.lolesports.com/persisted/gw
  feed-base-url: https://feed.lolesports.com/livestats/v1 # per-game live stats (champions, items, objectives)

steam:
  api-key: ${STEAM_API_KEY}
  base-url: https://api.steampowered.com/IDOTA2Match_570

cito:
  api-key: ${CITO_API_KEY}
  # Third-party aggregator of official ALGS results (EA publishes no API of its own - see CLAUDE.md).
  # Free tier: 500 calls/month. Sync makes exactly one call per tournaments-cron tick (~120/month).
  base-url: https://api.citoapi.com/api/v1

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000 # 24h

sync:
  matches-cron: "0 */15 * * * *"
  tournaments-cron: "0 0 */6 * * *"
