<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Tracker &mdash; API Test Console</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e37;
    --text: #e6e8eb;
    --muted: #8b909c;
    --accent: #5b8cff;
    --accent-hover: #7ea0ff;
    --ok: #3ecf8e;
    --err: #ff6b6b;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    display: flex;
    justify-content: center;
  }

  main {
    width: 100%;
    max-width: 880px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1.1rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }

  .status-bar .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 0.5rem;
    background: var(--err);
  }

  .status-bar.logged-in .dot {
    background: var(--ok);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .card h2 {
    font-size: 1rem;
    margin: 0 0 1rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
    margin-top: 0.75rem;
  }

  input {
    width: 100%;
    padding: 0.55rem 0.7rem;
    background: #0d0f13;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  button {
    margin-top: 1rem;
    width: 100%;
    padding: 0.6rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover { background: var(--accent-hover); }

  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  button.secondary:hover { border-color: var(--accent); background: transparent; }

  .row-buttons {
    display: flex;
    gap: 0.6rem;
  }

  .row-buttons button { margin-top: 0.75rem; }

  pre#log {
    background: #0d0f13;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-size: 0.8rem;
    max-height: 320px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
  }

  .log-entry { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px dashed var(--border); }
  .log-entry:last-child { border-bottom: none; }
  .log-ok { color: var(--ok); }
  .log-err { color: var(--err); }
  .log-meta { color: var(--muted); }

  ul#games-list {
    list-style: none;
    padding: 0;
    margin: 0.75rem 0 0;
  }

  ul#games-list li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }

  ul#games-list li:last-child { border-bottom: none; }
</style>
</head>
<body>
<main>
  <h1>Esports Tracker</h1>
  <div class="subtitle">API test console &mdash; talks directly to the REST endpoints on this same origin.</div>

  <div class="status-bar" id="status-bar">
    <span><span class="dot"></span><span id="status-text">Not logged in</span></span>
    <button class="secondary" style="width: auto; margin: 0;" id="logout-btn">Log out</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Register</h2>
      <label for="reg-username">Username</label>
      <input id="reg-username" placeholder="e.g. janmu" />
      <label for="reg-email">Email</label>
      <input id="reg-email" placeholder="e.g. jan@example.com" />
      <label for="reg-password">Password</label>
      <input id="reg-password" type="password" placeholder="min. 8 characters" />
      <button id="register-btn">Register</button>
    </div>

    <div class="card">
      <h2>Login</h2>
      <label for="login-username">Username</label>
      <input id="login-username" placeholder="e.g. janmu" />
      <label for="login-password">Password</label>
      <input id="login-password" type="password" placeholder="password" />
      <button id="login-btn">Log in</button>
    </div>
  </div>

  <div class="card">
    <h2>Authenticated actions</h2>
    <div class="row-buttons">
      <button id="me-btn">GET /api/users/me</button>
      <button class="secondary" id="games-btn">GET /api/games (public)</button>
    </div>
    <ul id="games-list"></ul>
  </div>

  <div class="card">
    <h2>Request log</h2>
    <pre id="log">No requests yet.</pre>
  </div>
</main>

<script>
  const API_BASE = "";
  const TOKEN_KEY = "esports_tracker_token";
  const USERNAME_KEY = "esports_tracker_username";

  const logEl = document.getElementById("log");
  const statusBar = document.getElementById("status-bar");
  const statusText = document.getElementById("status-text");

  function getToken() { return localStorage.getItem(TOKEN_KEY); }

  function setSession(token, username) {
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(USERNAME_KEY, username);
    refreshStatus();
  }

  function clearSession() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USERNAME_KEY);
    refreshStatus();
  }

  function refreshStatus() {
    const token = getToken();
    const username = localStorage.getItem(USERNAME_KEY);
    if (token) {
      statusBar.classList.add("logged-in");
      statusText.textContent = `Logged in as ${username}`;
    } else {
      statusBar.classList.remove("logged-in");
      statusText.textContent = "Not logged in";
    }
  }

  function log(label, status, body, isError) {
    if (logEl.textContent === "No requests yet.") logEl.textContent = "";
    const entry = document.createElement("div");
    entry.className = "log-entry";
    const statusClass = isError ? "log-err" : "log-ok";
    entry.innerHTML =
      `<div class="${statusClass}"><strong>${label}</strong> &rarr; HTTP ${status}</div>` +
      `<div class="log-meta">${new Date().toLocaleTimeString()}</div>` +
      `<div>${escapeHtml(JSON.stringify(body, null, 2))}</div>`;
    logEl.prepend(entry);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  async function callApi(label, path, options = {}) {
    try {
      const response = await fetch(API_BASE + path, options);
      const contentType = response.headers.get("content-type") || "";
      const body = contentType.includes("application/json") ? await response.json() : await response.text();
      log(label, response.status, body, !response.ok);
      return { ok: response.ok, status: response.status, body };
    } catch (err) {
      log(label, "network error", { message: err.message }, true);
      return { ok: false, status: 0, body: null };
    }
  }

  function authHeaders() {
    const token = getToken();
    return token ? { "Authorization": `Bearer ${token}` } : {};
  }

  document.getElementById("register-btn").addEventListener("click", async () => {
    const username = document.getElementById("reg-username").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;

    const result = await callApi("POST /api/auth/register", "/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    if (result.ok && result.body.token) {
      setSession(result.body.token, username);
    }
  });

  document.getElementById("login-btn").addEventListener("click", async () => {
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    const result = await callApi("POST /api/auth/login", "/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    if (result.ok && result.body.token) {
      setSession(result.body.token, username);
    }
  });

  document.getElementById("me-btn").addEventListener("click", async () => {
    await callApi("GET /api/users/me", "/api/users/me", { headers: authHeaders() });
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    clearSession();
    log("Logout", "local", { message: "Token cleared from browser storage." }, false);
  });

  document.getElementById("games-btn").addEventListener("click", async () => {
    const result = await callApi("GET /api/games", "/api/games");
    const listEl = document.getElementById("games-list");
    listEl.innerHTML = "";
    if (result.ok && Array.isArray(result.body)) {
      if (result.body.length === 0) {
        listEl.innerHTML = "<li>No games in the database yet.</li>";
      } else {
        result.body.forEach(game => {
          const li = document.createElement("li");
          li.textContent = `${game.name} (${game.slug})`;
          listEl.appendChild(li);
        });
      }
    }
  });

  refreshStatus();
</script>
</body>
</html>
